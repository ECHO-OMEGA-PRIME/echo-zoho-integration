name = "echo-zoho-integration"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "echo-zoho-integration"
database_id = "5d28e41d-97af-4457-8e18-5b1ecb27020f"

[[kv_namespaces]]
binding = "CACHE"
id = "c84a9392f606463fbd44a82de0bba3a7"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SDK_GATEWAY"
service = "echo-sdk-gateway"

[triggers]
crons = ["*/15 * * * *", "0 */6 * * *"]

[vars]
ZOHO_API_BASE = "https://www.zohoapis.com"
ZOHO_ACCOUNTS_URL = "https://accounts.zoho.com"
WORKER_VERSION = "2.0.0"
ZOHO_MAIL_URL = "https://mail.zoho.com"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
